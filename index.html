<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>product card</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <button id="change-color-all-card">Сменить цвет всех карточек </button>
  <button id="change-color-first-card">Сменить цвет первой карточки </button>
  <button id="open-google">Открыть страницу Google.com</button>
  <button id="output-console-log">Вывести сообщения в консоль лог</button>
  <button id="color-toggle-button" class="bg-red">Смена цвета</button>
  <div class="background"></div>
    <h1 class="title-product">Выбери свой продукт</h1>
    <ul id="product-list" class="products-list"></ul>
    <template id="product-template">
      <li class="card-list-item">
        <img class="product-img" alt="img" width="290" height="245">
        <span class="product-category"></span>
        <h3 class="product-name"></h3>
        <p class="product-description"></p>
        <span class="product-compound-text">Состав:</span>
        <ul class="product-compound"></ul>
        <div class="price-container">
          <span class="price">Цена</span>
          <span class="cost-product"></span>
        </div>
      </li>
    </template>
    <script src="main.js"></script>
    <script src="homework-5.js"></script>
    <script src="homework-6.js"></script>
    <script type="module" src="homework-7.js"></script>
    <script type="module" src="homework-8.js"></script>
    <script type="module" src="productCards.js"></script>
</body>
</html>
